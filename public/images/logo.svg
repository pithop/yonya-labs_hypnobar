  <circle cx="140" cy="100" r="7" fill="#EC4899"/>
  <circle cx="285" cy="82" r="5" fill="#EC4899"/>
  <circle cx="300" cy="168" r="8" fill="#EC4899"/>
  <circle cx="260" cy="232" r="6" fill="#EC4899"/>
  <circle cx="148" cy="250" r="4.5" fill="#F472B6"/>

