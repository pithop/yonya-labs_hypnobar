<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" fill="none">
  <defs>
    <!-- Gradient for the purple main circle -->
    <radialGradient id="purpleGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#9B59E8"/>
      <stop offset="100%" stop-color="#6C2DC7"/>
    </radialGradient>
    <!-- Gradient for the orange circle -->
    <radialGradient id="orangeGrad" cx="40%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#E8892A"/>
    </radialGradient>
    <!-- Gradient for the blue circle -->
    <radialGradient id="blueGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2E5FA1"/>
    </radialGradient>
    <!-- Glow filter for the spiral -->
    <filter id="spiralGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle shadow for depth -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Blue circle (bottom-left, behind) -->
  <circle cx="145" cy="210" r="65" fill="url(#blueGrad)" filter="url(#softShadow)"/>
  
  <!-- Orange circle (top-right, behind) -->
  <circle cx="265" cy="130" r="72" fill="url(#orangeGrad)" filter="url(#softShadow)"/>
  
  <!-- Purple main circle (center) -->
  <circle cx="200" cy="170" r="95" fill="url(#purpleGrad)" filter="url(#softShadow)"/>

  <!-- Small decorative dots -->
  <circle cx="135" cy="105" r="8" fill="#FF2D78"/>
  <circle cx="290" cy="85" r="6" fill="#FF2D78"/>
  <circle cx="310" cy="175" r="9" fill="#FF2D78"/>
  <circle cx="115" cy="170" r="5" fill="#FF6B9D"/>
  <circle cx="265" cy="240" r="7" fill="#FF2D78"/>
  <circle cx="155" cy="260" r="5" fill="#FF6B9D"/>

  <!-- Hypnotic Spiral (hand-drawn look with white strokes) -->
  <g filter="url(#spiralGlow)" transform="translate(200, 165)">
    <path d="M 0,-8 
      C 6,-8 10,-3 10,3 
      C 10,12 2,18 -7,18 
      C -19,18 -25,8 -25,-3 
      C -25,-18 -13,-28 3,-28 
      C 22,-28 34,-15 34,3 
      C 34,25 19,40 -3,40 
      C -28,40 -46,22 -46,-3 
      C -46,-32 -25,-52 3,-52 
      C 35,-52 57,-30 57,3 
      C 57,38 36,62 -3,62 
      C -42,62 -66,38 -66,-3
      C -66,-46 -40,-72 3,-72" 
      stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- "HypnoBar" text using a serif font (matching Playfair Display feel) -->
  <text x="200" y="330" text-anchor="middle" 
    font-family="'Playfair Display', 'Georgia', serif" 
    font-size="62" font-weight="700" fill="white" letter-spacing="1">
    Hypno<tspan fill="#FF2D78">Bar</tspan>
  </text>
</svg>
