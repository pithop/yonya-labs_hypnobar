<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" fill="none">
  <defs>
    <radialGradient id="purpleGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <radialGradient id="orangeGrad" cx="40%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
    <radialGradient id="blueGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </radialGradient>
    <filter id="spiralGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Blue circle (bottom-left, smaller, partially behind purple) -->
  <circle cx="152" cy="205" r="48" fill="url(#blueGrad)"/>
  
  <!-- Orange circle (upper-right, overlapping purple) -->
  <circle cx="260" cy="120" r="60" fill="url(#orangeGrad)"/>
  
  <!-- Purple main circle (center, dominant) -->
  <circle cx="200" cy="165" r="90" fill="url(#purpleGrad)"/>

